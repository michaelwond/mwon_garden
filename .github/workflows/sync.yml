name: Sync Notion to Website
on:
  schedule:
    - cron: '0 * * * *' # Checks Notion every hour
  workflow_dispatch: # Allows manual syncing via the button

permissions:
  contents: write # Explicitly allows the script to save your Notion text into GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Content from Notion
        uses: YouXam/Notion-GitHub-Sync@v2
        with:
          notion_token: ${{ secrets.NOTION_TOKEN }}

      - name: Deploy Changes
        run: |
          git config --global user.name "Notion Sync Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Updated content from Notion" || exit 0
          git push
